<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover the soul of Kerala through authentic festival discovery, sacred rituals, and hidden heritage landmarks. LiveKeralam connects you to the deep traditions of God's Own Country." />
    <meta name="keywords" content="Kerala festivals, heritage tourism, Theyyam, Kathakali, temple festivals, Kerala heritage sites, cultural discovery" />
    <meta name="author" content="LiveKeralam" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://livekeralam.com/" />
    <meta property="og:title" content="LiveKeralam | God's Own Events & Heritage Discovery" />
    <meta property="og:description" content="Discover exclusive cultural festivals, sacred rituals, and hidden heritage spots across Kerala." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="LiveKeralam | God's Own Events & Heritage" />
    <meta property="twitter:description" content="Discover exclusive cultural festivals, sacred rituals, and hidden heritage spots across Kerala." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <title>LiveKeralam | Kerala Heritage & Live Cultural Discovery</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LiveKeralam",
      "url": "https://livekeralam.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://livekeralam.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
